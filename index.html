<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gestação Thamyres 🤰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--mae:#b5005b;--mae-dark:#7b003d;--mae-surface:#fff0f5;--mae-tint:#ffd6e7;--mae-border:#f9a8d4;
--bebe:#2d7a4f;--bebe-dark:#1a4d31;--bebe-surface:#edfaf3;--bebe-tint:#bbf7d0;--bebe-border:#86efac;
--alerta:#c2410c;--alerta-surface:#fff7ed;--alerta-border:#fed7aa;
--bg:#faf8f9;--card:#ffffff;--ink:#1a0a10;--inkMid:#6b3a50;--inkSoft:#9e7080;--line:#ede8eb;
--r16:16px;--r12:12px;--r8:8px;--sh:0 2px 12px rgba(0,0,0,.06);
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-tap-highlight-color:transparent}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:'DM Sans',sans-serif;outline:none}
textarea{resize:vertical}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fadeUp{animation:fadeUp 280ms ease-out both}
.page{display:none;padding:16px 16px 100px;max-width:480px;margin:0 auto;animation:fadeUp 280ms ease-out}
.page.active{display:block}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(250,248,249,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-inner{display:flex;overflow-x:auto;scrollbar-width:none;gap:4px;padding:0 12px;max-width:480px;margin:0 auto}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:12px;background:none;border:none;color:var(--inkSoft);font-size:10px;font-weight:600;white-space:nowrap;transition:all 150ms;min-width:52px}
.nav-btn .ico{font-size:20px;line-height:1}
.nav-btn.active{background:var(--mae-surface);color:var(--mae)}
.nav-fab{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--mae),var(--mae-dark));color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(181,0,91,.35);flex-shrink:0;align-self:center;transition:transform 150ms}
.nav-fab:active{transform:scale(.92)}

/* CARDS */
.card{background:var(--card);border-radius:var(--r16);box-shadow:var(--sh);border:1px solid var(--line);padding:16px;margin-bottom:12px}
.card-sm{padding:12px}
.card-clickable{cursor:pointer;transition:transform 100ms,box-shadow 100ms}
.card-clickable:active{transform:scale(.98);box-shadow:none}

/* SECTION HEADER */
.sec-header{border-radius:var(--r16);padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.sec-header .deco{position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;opacity:.08;background:#fff}
.sec-header h2{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:#fff;position:relative}
.sec-header p{font-size:13px;color:rgba(255,255,255,.85);margin-top:4px;position:relative}
.mae-header{background:linear-gradient(145deg,var(--mae),var(--mae-dark))}
.bebe-header{background:linear-gradient(145deg,var(--bebe),var(--bebe-dark))}

/* PILLS */
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;line-height:1.4}
.pill-mae{background:var(--mae-tint);color:var(--mae-dark)}
.pill-bebe{background:var(--bebe-tint);color:var(--bebe-dark)}
.pill-ok{background:#e8f5e9;color:#2e7d32}
.pill-alerta{background:#fff3e0;color:#e65100}
.pill-realizada{background:#e8f5e9;color:#2e7d32}
.pill-pendente{background:#fff3e0;color:#e65100}
.pill-urgente{background:#fce4ec;color:#b71c1c}
.pill-cinza{background:var(--line);color:var(--inkMid)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:600;transition:all 150ms;border:none;cursor:pointer}
.btn:active{transform:scale(.96)}
.btn-mae{background:linear-gradient(135deg,var(--mae),var(--mae-dark));color:#fff;box-shadow:0 2px 8px rgba(181,0,91,.25)}
.btn-bebe{background:linear-gradient(135deg,var(--bebe),var(--bebe-dark));color:#fff;box-shadow:0 2px 8px rgba(45,122,79,.25)}
.btn-ghost{background:var(--mae-surface);color:var(--mae);border:1px solid var(--mae-border)}
.btn-ghost-bebe{background:var(--bebe-surface);color:var(--bebe);border:1px solid var(--bebe-border)}
.btn-danger{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:10px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* INPUTS */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--inkMid);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:var(--r8);font-size:14px;background:var(--card);color:var(--ink);transition:border-color 150ms}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--mae)}
.field textarea{min-height:80px}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip{padding:6px 14px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid var(--line);background:var(--card);color:var(--inkMid);cursor:pointer;transition:all 150ms}
.chip.active-mae{border-color:var(--mae);background:var(--mae-surface);color:var(--mae)}
.chip.active-bebe{border-color:var(--bebe);background:var(--bebe-surface);color:var(--bebe)}

/* HERO HOME */
.hero{background:linear-gradient(145deg,var(--mae),var(--mae-dark));border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.hero .deco1{position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero .deco2{position:absolute;right:30px;bottom:-40px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-saudacao{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:8px}
.hero-semana{font-family:'Nunito',sans-serif;font-size:56px;font-weight:800;color:#fff;line-height:1}
.hero-semana span{font-size:36px;font-weight:700;opacity:.9}
.hero-bebe{font-size:13px;color:rgba(255,255,255,.9);margin-top:10px;line-height:1.5}
.hero-dias{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}
.progress-bar{height:4px;background:rgba(255,255,255,.2);border-radius:99px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;background:rgba(255,255,255,.7);border-radius:99px;transition:width 1s ease}

/* TABS INTERNAS */
.subtabs{display:flex;background:var(--mae-surface);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px}
.subtab{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:600;border:none;background:none;color:var(--inkSoft);cursor:pointer;transition:all 150ms;text-align:center}
.subtab.active{background:var(--card);color:var(--mae);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.subtabs-bebe .subtab.active{background:var(--card);color:var(--bebe)}
.subtabs-bebe{background:var(--bebe-surface)}

/* TIMELINE */
.timeline-item{display:flex;gap:12px;margin-bottom:16px}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.timeline-line{width:2px;background:var(--line);margin:0 auto}

/* PROGRESSO PRÉ-NATAL */
.pn-timeline{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;gap:0;padding:8px 0;margin-bottom:8px}
.pn-timeline::-webkit-scrollbar{display:none}
.pn-node{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:48px}
.pn-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--line);background:var(--card);color:var(--inkSoft);flex-shrink:0;transition:all 200ms}
.pn-circle.done{background:var(--mae);border-color:var(--mae);color:#fff}
.pn-circle.now{background:var(--mae-tint);border-color:var(--mae);color:var(--mae)}
.pn-circle.done-bebe{background:var(--bebe);border-color:var(--bebe);color:#fff}
.pn-circle.now-bebe{background:var(--bebe-tint);border-color:var(--bebe);color:var(--bebe)}
.pn-label{font-size:9px;color:var(--inkSoft);white-space:nowrap}
.pn-connector{flex:1;height:2px;background:var(--line);min-width:8px}
.pn-connector.done{background:var(--mae)}

/* EXAMES LIST */
.exame-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:var(--card);border:1px solid var(--line);margin-bottom:8px;cursor:pointer;transition:all 150ms}
.exame-item:active{transform:scale(.98)}
.exame-item.alerta{border-color:var(--alerta-border);background:var(--alerta-surface)}
.exame-ico{font-size:24px;flex-shrink:0}
.exame-info{flex:1;min-width:0}
.exame-nome{font-size:14px;font-weight:600;color:var(--ink)}
.exame-data{font-size:12px;color:var(--inkSoft);margin-top:1px}
.exame-resumo{font-size:12px;color:var(--inkMid);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MOVIMENTO */
.mov-idle{text-align:center;padding:32px 0}
.mov-count{font-family:'Nunito',sans-serif;font-size:72px;font-weight:800;color:var(--bebe);line-height:1}
.mov-timer{font-size:40px;font-weight:700;color:var(--inkMid);margin:8px 0}
.btn-mov{width:100%;padding:20px;border-radius:20px;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--bebe),var(--bebe-dark));color:#fff;border:none;cursor:pointer;transition:all 150ms;box-shadow:0 4px 20px rgba(45,122,79,.3)}
.btn-mov:active{transform:scale(.96)}

/* MODAL / BOTTOM SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;animation:fadeIn 200ms ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;margin:0 auto;max-height:92vh;overflow-y:auto;animation:slideUp 300ms cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 16px}
.sheet-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:var(--ink);margin-bottom:16px}

/* MES HEADER */
.mes-header{font-size:11px;font-weight:700;color:var(--inkSoft);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;padding-left:4px}

/* ALTERNADOR BEBE */
.alt-bebe{display:flex;background:var(--bebe-surface);border-radius:12px;padding:4px;gap:4px;margin-bottom:16px}
.alt-btn{flex:1;padding:7px;border-radius:9px;font-size:12px;font-weight:600;border:none;background:none;color:var(--inkSoft);cursor:pointer;transition:all 150ms;text-align:center}
.alt-btn.active{background:var(--card);color:var(--bebe);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--line)}
.stat-val{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
.stat-label{font-size:11px;color:var(--inkSoft);margin-top:2px}

/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--inkSoft);width:80px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:16px;background:var(--line);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 600ms ease}
.bar-fill-mae{background:linear-gradient(90deg,var(--mae-tint),var(--mae))}
.bar-fill-bebe{background:linear-gradient(90deg,var(--bebe-tint),var(--bebe))}
.bar-val{font-size:11px;font-weight:600;color:var(--inkMid);width:56px;flex-shrink:0}

/* SAUDE DAILY */
.saude-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.saude-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer;transition:all 150ms}
.saude-item:active{transform:scale(.97)}
.saude-ico{font-size:18px}
.saude-val{font-size:16px;font-weight:700;color:var(--ink);margin-top:2px}
.saude-lbl{font-size:10px;color:var(--inkSoft)}

/* PENDENCIAS */
.pend-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--alerta-surface);border:1px solid var(--alerta-border);margin-bottom:8px}
.pend-nome{flex:1;font-size:13px;font-weight:600;color:var(--ink)}

/* BACK BTN */
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--mae);font-size:14px;font-weight:600;padding:0;margin-bottom:16px;cursor:pointer}

/* DUVIDA ITEM */
.duvida-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;background:var(--mae-surface);border:1px solid var(--mae-border);margin-bottom:8px}
.duvida-txt{flex:1;font-size:13px;color:var(--ink)}
.btn-x{background:none;border:none;color:var(--inkSoft);font-size:16px;cursor:pointer;padding:0 4px;line-height:1}

/* PEDIDO ITEM */
.pedido-item{display:flex;align-items:flex-start;gap:8px;padding:12px;border-radius:10px;border:1px solid var(--line);margin-bottom:8px;background:var(--card)}
.pedido-item.pendente{border-color:var(--alerta-border);background:var(--alerta-surface)}

/* MED CARD */
.med-card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--line);margin-bottom:10px}
.med-nome{font-size:15px;font-weight:700;color:var(--ink)}
.med-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.med-field input{padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;width:100%;background:var(--bg)}
.med-field input:focus{border-color:var(--mae)}
.med-field label{font-size:10px;font-weight:600;color:var(--inkSoft);display:block;margin-bottom:3px}
.med-obs{margin-top:8px}
.med-obs input{padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;width:100%;background:var(--bg)}
.med-obs input:focus{border-color:var(--mae)}
.med-actions{display:flex;gap:8px;margin-top:10px}

/* IA MODAL ESPECIAL */
.ia-step{padding:12px;border-radius:12px;border:1.5px solid var(--line);margin-bottom:10px}
.ia-step-num{width:24px;height:24px;border-radius:50%;background:var(--mae);color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-right:8px}
.ia-code{background:var(--bg);border-radius:8px;padding:10px;font-family:monospace;font-size:12px;color:var(--ink);border:1px solid var(--line);word-break:break-all;white-space:pre-wrap;max-height:120px;overflow-y:auto}
</style>
</head>
<body>

<!-- PAGES -->
<div id="pg-home" class="page active"></div>
<div id="pg-exames" class="page"></div>
<div id="pg-exdetalhe" class="page"></div>
<div id="pg-addexame" class="page"></div>
<div id="pg-bebe" class="page"></div>
<div id="pg-movs" class="page"></div>
<div id="pg-meds" class="page"></div>
<div id="pg-peso" class="page"></div>
<div id="pg-consultas" class="page"></div>
<div id="pg-consdetalhe" class="page"></div>
<div id="pg-consform" class="page"></div>
<div id="pg-conshist" class="page"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" onclick="nav('home')" id="nav-home"><span class="ico">🏠</span>Início</button>
    <button class="nav-btn" onclick="nav('exames')" id="nav-exames"><span class="ico">📋</span>Exames</button>
    <button class="nav-btn" onclick="nav('bebe')" id="nav-bebe"><span class="ico">🌿</span>Bebê</button>
    <button class="nav-btn" onclick="nav('consultas')" id="nav-consultas"><span class="ico">👩‍⚕️</span>Consultas</button>
    <button class="nav-btn" onclick="nav('meds')" id="nav-meds"><span class="ico">💊</span>Meds</button>
    <button class="nav-btn" onclick="nav('peso')" id="nav-peso"><span class="ico">⚖️</span>Peso</button>
    <button class="nav-btn" onclick="nav('movs')" id="nav-movs"><span class="ico">👣</span>Movimentos</button>
    <button class="nav-fab" onclick="showFAB()">+</button>
  </div>
</nav>

<script>
// ============================
// CONSTANTES
// ============================
const DUM = new Date('2026-04-18T12:00:00');
const DPP = new Date(DUM.getTime() + 280*86400000);
const NOME = 'Thamyres';

const BEBE_DATA = {
  0:  {fr:'🌱 Semente',an:'🦠 Embrião',ob:'💧 Gota',peso:'<1g',comp:'1mm',desc:'Implantação ocorrendo'},
  5:  {fr:'🌾 Semente de gergelim',an:'🦐 Larva',ob:'✏️ Ponto de lápis',peso:'<1g',comp:'2mm',desc:'Coração começa a se formar'},
  6:  {fr:'🫘 Lentilha',an:'🐛 Larva',ob:'🫘 Lentilha',peso:'<1g',comp:'4–6mm',desc:'Olhos e ouvidos surgindo'},
  7:  {fr:'🫐 Mirtilo',an:'🐌 Caracol',ob:'🍬 Bala pequena',peso:'1g',comp:'1cm',desc:'Braços e pernas se formam'},
  8:  {fr:'🍓 Framboesa',an:'🐹 Hamster',ob:'🧴 Tampa de batom',peso:'1–2g',comp:'1,6cm',desc:'Todos os órgãos presentes'},
  9:  {fr:'🍇 Uva',an:'🐭 Ratinho',ob:'🔑 Chave pequena',peso:'2–3g',comp:'2,3cm',desc:'Movimentos espontâneos'},
  10: {fr:'🍑 Ameixa',an:'🐭 Hamster',ob:'🥄 Colher de café',peso:'4g',comp:'3,1cm',desc:'Unhas começam a crescer'},
  11: {fr:'🍋 Limão',an:'🐱 Gatinho',ob:'🖊️ Caneta',peso:'7g',comp:'4,1cm',desc:'Bebê engole líquido amniótico'},
  12: {fr:'🍐 Pera pequena',an:'🐱 Gato',ob:'📱 Celular',peso:'14g',comp:'5,4cm',desc:'Fim do 1º trimestre 🎉'},
  16: {fr:'🥑 Abacate',an:'🐰 Coelho',ob:'📓 Caderninho',peso:'100g',comp:'11,6cm',desc:'Pode ouvir sua voz'},
  20: {fr:'🥭 Manga',an:'🦊 Raposinha',ob:'💻 Notebook',peso:'300g',comp:'25cm',desc:'Metade da gestação!'},
  24: {fr:'🌽 Espiga de milho',an:'🐶 Cachorrinho',ob:'📏 Régua',peso:'600g',comp:'30cm',desc:'Pulmões em desenvolvimento'},
  28: {fr:'🍆 Berinjela',an:'🐈 Gato',ob:'📦 Caixa de sapato',peso:'1000g',comp:'37cm',desc:'Abre e fecha os olhos'},
  32: {fr:'🥦 Brócolis',an:'🐱 Gato adulto',ob:'🎒 Mochila',peso:'1700g',comp:'42cm',desc:'Pratica respiração'},
  36: {fr:'🥬 Alface romana',an:'🐕 Cachorro médio',ob:'🧳 Mala',peso:'2600g',comp:'47cm',desc:'Quase pronto para nascer'},
  40: {fr:'🎃 Abóbora',an:'🐑 Cordeiro',ob:'🚗 Carrinho de bebê',peso:'3200–3500g',comp:'50cm',desc:'Chegou a hora! 🎉'},
};

const MARCOS_PN = [8,12,16,20,24,28,32,36,40];
const MARCOS_BEBE = [
  {sem:5,txt:'Coração',ico:'❤️'},
  {sem:8,txt:'Órgãos',ico:'🫀'},
  {sem:12,txt:'1º Tri',ico:'🎉'},
  {sem:16,txt:'Ouve',ico:'👂'},
  {sem:20,txt:'Metade',ico:'⭐'},
  {sem:24,txt:'Pulmões',ico:'🫁'},
  {sem:28,txt:'Olhos',ico:'👁️'},
  {sem:36,txt:'Posição',ico:'👶'},
  {sem:40,txt:'Nascimento',ico:'🎊'},
];

const TIPOS_CONS = ['Pré-natal','Ultrassom','Exames','Nutricionista','Psicólogo','Vacinação','Outros'];

// ============================
// ESTADO
// ============================
let state = {
  grupos:[],consultas:[],meds:[],pesos:[],pedidosMedicos:[],
  crescimentoBebe:[],movHist:[],saudeDiaria:{}
};

let _saveTimer = null;
function saveState(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    try{ localStorage.setItem('gestacao_v1', JSON.stringify(state)); }catch(e){}
  },300);
}

function loadState(){
  try{
    const raw = localStorage.getItem('gestacao_v1');
    if(raw){ const s = JSON.parse(raw); Object.assign(state,s); return; }
  }catch(e){}
  initDefaults();
}

// ============================
// HELPERS
// ============================
function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function parseDate(s){ return new Date(s+'T12:00:00'); }
function fmtDate(s){ if(!s)return''; const d=parseDate(s); return d.toLocaleDateString('pt-BR'); }
function fmtDatetime(date){ return date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function today(){ return new Date().toISOString().split('T')[0]; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function calcSemana(dataStr){
  const data = typeof dataStr==='string'? parseDate(dataStr) : dataStr;
  const dias = Math.floor((data - DUM)/86400000);
  if(dias<6) return {s:0,d:dias<0?0:dias};
  return {s:Math.floor((dias-6)/7)+1, d:(dias-6)%7};
}

function semAtual(){
  return calcSemana(new Date());
}

function diasGest(){
  return Math.floor((new Date()-DUM)/86400000);
}

function getBebeSem(s){
  const keys = Object.keys(BEBE_DATA).map(Number).sort((a,b)=>a-b);
  let best = keys[0];
  for(const k of keys){ if(k<=s) best=k; }
  return BEBE_DATA[best];
}

function artigo(nome){
  return /^[AEIOUaeiou]/.test(nome.split(' ')[0])? 'uma':'um';
}

function trimestre(s){
  if(s<=13) return '1º Trimestre';
  if(s<=26) return '2º Trimestre';
  return '3º Trimestre';
}

function getIconeExame(nome){
  const n=nome.toLowerCase();
  if(/ultra|usg/.test(n)) return '🔬';
  if(/beta|hcg/.test(n)) return '🤰';
  if(/hemo|sangue/.test(n)) return '🩸';
  if(/vitam|ferro|ferri/.test(n)) return '💊';
  if(/horm|tireo|tsh|t4/.test(n)) return '🧬';
  if(/imuno|toxo|rubeo/.test(n)) return '🛡️';
  if(/mama|mam/.test(n)) return '🩺';
  if(/colest|lipid/.test(n)) return '💉';
  return '📋';
}

function diasParaDPP(){
  return Math.max(0, Math.floor((DPP - new Date())/86400000));
}

function fmtSem({s,d}){
  if(s===0) return d===0?'Semana 0':'Semana 0, '+d+' dia'+(d>1?'s':'');
  if(d===0) return 'Semana '+s;
  return 'Semana '+s+', '+d+' dia'+(d>1?'s':'');
}

function getSaudeDia(campo){
  const chave = today();
  return (state.saudeDiaria[chave]||{})[campo]||'';
}
function setSaudeDia(campo,val){
  const chave = today();
  if(!state.saudeDiaria[chave]) state.saudeDiaria[chave]={};
  state.saudeDiaria[chave][campo]=val;
  saveState();
}

  });

  // Agrupar por mês
  const byMes = {};

    const last = regs.sort((a,b)=>b.data.localeCompare(a.data))[0];

  const meses = Object.keys(byMes).sort((a,b)=>b.localeCompare(a));
  const mesNomes = {
    '2026-05':'Maio 2026','2026-04':'Abril 2026','2026-03':'Março 2026',

    html+=`<div class="mes-header">${mesNomes[mes]||mes}</div>`;

      const icoAlerta = last.status==='alerta'?' ⚠️':'';

function setAeP(p){

}

function sugerirNomeExame(url){
  if(!url) return;
  const n = document.getElementById('ae-nome');
  if(n.value) return;
  if(/ultra|usg/i.test(url)) n.value='Ultrassom';
  else if(/hemo/i.test(url)) n.value='Hemograma Completo';
  else if(/beta/i.test(url)) n.value='Beta-HCG';
}

function salvarExame(){
  const nome = document.getElementById('ae-nome').value.trim();
  const data = document.getElementById('ae-data').value;
  if(!nome||!data){ alert('Preencha nome e data'); return; }
  state.grupos.push({
    id:uid(),p:window._aeP||1,nome,data,
    resultado:document.getElementById('ae-resultado').value,
    status:document.getElementById('ae-status').value,
    notas:document.getElementById('ae-notas').value,
    drive:document.getElementById('ae-drive').value,
  });
  saveState();
  nav('exames');
}

let movAtivo = false;
let movCount = 0;
let movStart = null;
let movTimer = null;

function renderMovs(){
  const hist = [...state.movHist].sort((a,b)=>b.data.localeCompare(a.data));
  let histHtml='';
  if(hist.length){
    hist.forEach(h=>{
      histHtml+=`
      <div class="card card-sm" style="display:flex;align-items:center;gap:12px">
        <span style="font-size:24px">👣</span>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">${h.movimentos} movimentos</div>
          <div style="font-size:12px;color:var(--inkSoft)">${fmtDate(h.data)} · ${h.tempo} min</div>
        </div>
        <button class="btn-x" onclick="delMov('${esc(h.id)}')">🗑</button>
      </div>`;
    });
  } else {
    histHtml=`<div class="card" style="text-align:center;padding:20px;color:var(--inkSoft)">
      <div style="font-size:32px;margin-bottom:8px">👣</div>
      <div style="font-size:13px">Nenhuma sessão registrada ainda.<br>O bebê deve se mover pelo menos 10 vezes em 2 horas.</div>
    </div>`;
  }

  if(movAtivo){
    const sec = Math.floor((Date.now()-movStart)/1000);
    const mm=String(Math.floor(sec/60)).padStart(2,'0');
    const ss=String(sec%60).padStart(2,'0');
    document.getElementById('pg-movs').innerHTML=`
    <div class="sec-header bebe-header">
      <div class="deco"></div>
      <h2>👣 Movimentos Fetais</h2>
      <p>Sessão em andamento</p>
    </div>
    <div class="card" style="text-align:center;padding:24px">
      <div class="mov-count" id="mov-count">${movCount}</div>
      <div style="font-size:13px;color:var(--inkSoft);margin:4px 0 12px">movimentos registrados</div>
      <div class="mov-timer" id="mov-timer">${mm}:${ss}</div>
      <button class="btn-mov" onclick="regMov()">👣 Registrar movimento</button>
      <button class="btn btn-ghost btn-full" style="margin-top:10px" onclick="finalizarMov()">✓ Finalizar sessão</button>
    </div>
    ${histHtml}`;
    clearInterval(movTimer);
    movTimer=setInterval(()=>{
      const s2=Math.floor((Date.now()-movStart)/1000);
      const el=document.getElementById('mov-timer');
      if(el) el.textContent=String(Math.floor(s2/60)).padStart(2,'0')+':'+String(s2%60).padStart(2,'0');
    },1000);
  } else {
    document.getElementById('pg-movs').innerHTML=`
    <div class="sec-header bebe-header">
      <div class="deco"></div>
      <h2>👣 Movimentos Fetais</h2>
      <p>Contagem de movimentos do bebê</p>
    </div>
    <div class="mov-idle">
      <div style="font-size:80px;margin-bottom:16px">👣</div>
      <div style="font-size:14px;color:var(--inkMid);max-width:280px;margin:0 auto 24px;line-height:1.6">Registre os movimentos do seu bebê. Ele deve se mover pelo menos 10 vezes em 2 horas.</div>
      <button class="btn btn-bebe" style="padding:14px 32px;font-size:16px" onclick="iniciarMov()">▶ Iniciar contagem</button>
    </div>
    ${histHtml}`;
  }
}

function iniciarMov(){
  movAtivo=true; movCount=0; movStart=Date.now();
  renderMovs();
}

function regMov(){
  movCount++;
  const el=document.getElementById('mov-count');
  if(el){ el.textContent=movCount; el.style.transform='scale(1.2)'; setTimeout(()=>el.style.transform='',150); }
}

function finalizarMov(){
  clearInterval(movTimer);
  const tempo = Math.round((Date.now()-movStart)/60000);
  state.movHist.push({id:uid(),data:today(),movimentos:movCount,tempo:Math.max(1,tempo)});
  movAtivo=false; saveState(); renderMovs();
}

function delMov(id){
  state.movHist=state.movHist.filter(m=>m.id!==id);
  saveState(); renderMovs();
}

function toggleMedEdit(id){
  const v=document.getElementById('med-view-'+id);
  const e=document.getElementById('med-edit-'+id);
  if(!v||!e) return;
  const show=e.style.display==='none';
  v.style.display=show?'none':'block';
  e.style.display=show?'block':'none';
}

function medAutoSave(id,campo,val){
  const m=state.meds.find(m=>m.id===id);
  if(m){ m[campo]=val; saveState(); }
}

function confirmarDelMed(id){
  const m=state.meds.find(m=>m.id===id);
  if(!m) return;
  const sh=mkSheet(`Remover "${m.nome}"?`,`
    <p style="font-size:14px;color:var(--inkMid);margin-bottom:16px">Esta ação não pode ser desfeita.</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn btn-danger btn-full" onclick="delMed('${esc(id)}');this.closest('.overlay').remove()">Remover</button>
    </div>`);
  document.body.appendChild(sh);
}

function delMed(id){
  state.meds=state.meds.filter(m=>m.id!==id);
  saveState(); renderMeds();
}

function showAddMed(){
  let tipo='continuo';
  const sh=mkSheet('Adicionar Medicamento',`

  window._medTipo='continuo';
  document.body.appendChild(sh);
}

function setChipMed(el,t){
  window._medTipo=t;
  document.querySelectorAll('#chips-med-tipo .chip').forEach(c=>{c.className='chip';});

function salvarMed(){
  const nome=document.getElementById('nm-nome').value.trim();

function renderPesoMae(s){

  if(s<=13) ganhoRec='0,5 – 2 kg';

  const barras=pesos.map(p=>{
    const semP=calcSemana(p.data);
    const w=Math.round(((p.peso-pesoInicial)/(maxPeso-pesoInicial+0.001))*100);
    return `
    <div class="bar-row">
      <div class="bar-label">${fmtDate(p.data)}</div>
      <div class="bar-track"><div class="bar-fill bar-fill-mae" style="width:${Math.max(4,w)}%"></div></div>

        ${p.obs?`<div style="font-size:11px;color:var(--inkMid)">${esc(p.obs)}</div>`:''}

      <button class="btn-x" onclick="delPeso('${esc(p.id)}')">🗑</button>

function addDuvida(consId){
  const inp=document.getElementById('nova-duvida');
  const txt=inp.value.trim();
  if(!txt) return;
  const c=state.consultas.find(c=>c.id===consId);
  if(c){ c.perguntas=[...(c.perguntas||[]),txt]; saveState(); inp.value=''; renderConsDetalhe(consId); }
}

function delDuvida(consId,idx){
  const c=state.consultas.find(c=>c.id===consId);
  if(c){ c.perguntas=(c.perguntas||[]).filter((_,i)=>i!==idx); saveState(); renderConsDetalhe(consId); }
}

function salvarAnotacoes(consId,val){
  const c=state.consultas.find(c=>c.id===consId);
  if(c){ c.anotacoes=val; saveState(); }
}

function marcarRealizada(consId){
  const c=state.consultas.find(c=>c.id===consId);
  if(c){ c.realizada=true; saveState(); renderConsDetalhe(consId); }
}

function vincularExame(consId){
  const sel=document.getElementById('sel-exame');
  const val=sel.value;
  if(!val) return;
  const c=state.consultas.find(c=>c.id===consId);
  if(c&&!(c.examesVinculados||[]).includes(val)){
    c.examesVinculados=[...(c.examesVinculados||[]),val];
    saveState(); renderConsDetalhe(consId);
  }
}

function delExVinculado(consId,nome){
  const c=state.consultas.find(c=>c.id===consId);
  if(c){ c.examesVinculados=(c.examesVinculados||[]).filter(n=>n!==nome); saveState(); renderConsDetalhe(consId); }
}

function delPedido(id){
  state.pedidosMedicos=state.pedidosMedicos.filter(p=>p.id!==id);
  saveState(); renderConsDetalhe(consDetalheId);
}

function confirmarDelCons(id){
  const c=state.consultas.find(c=>c.id===id);
  if(!c) return;
  const sh=mkSheet(`Remover consulta?`,`
    <p style="font-size:14px;color:var(--inkMid);margin-bottom:16px">A consulta com ${esc(c.medico)} em ${fmtDate(c.data)} será removida permanentemente.</p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn btn-danger btn-full" onclick="delCons('${esc(id)}');this.closest('.overlay').remove()">Remover</button>
    </div>`);
  document.body.appendChild(sh);
}

function delCons(id){
  state.consultas=state.consultas.filter(c=>c.id!==id);
  state.pedidosMedicos=state.pedidosMedicos.filter(p=>p.consultaId!==id);
  saveState(); goTo('consultas');
}

function copiarParaClaude(){
  const txt=document.getElementById('pd-texto').value.trim();
  if(!txt){ alert('Escreva o texto do pedido primeiro'); return; }
  const msg=`Analise este pedido médico e identifique todos os exames solicitados. Retorne APENAS um JSON válido no formato: {"exames":["Nome do Exame 1","Nome do Exame 2"]}

Pedido:
${txt}`;
  if(navigator.clipboard){ navigator.clipboard.writeText(msg); }
  else{ const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove(); }
  alert('✓ Texto copiado! Cole no chat com @Claude e traga a resposta JSON aqui.');
}

function previewJsonExames(val){
  const div=document.getElementById('pd-exames-preview');
  if(!div||!val.trim()) return;
  try{
    const raw=val.replace(/```json|```/g,'').trim();
    const j=JSON.parse(raw);
    const lista=j.exames||[];
    div.innerHTML=`<div style="font-size:12px;font-weight:700;color:var(--bebe);margin-bottom:6px">✓ Exames identificados:</div>`+
      lista.map((n,i)=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="pill pill-bebe">${esc(n)}</span>
        <button class="btn-x" onclick="this.parentElement.remove()">✕</button>
      </div>`).join('');
  }catch(e){ div.innerHTML='<div style="font-size:11px;color:var(--alerta)">JSON inválido</div>'; }
}

function salvarPedido(consId){
  const texto=document.getElementById('pd-texto').value.trim();
  const jsonVal=document.getElementById('pd-json').value.trim();
  const drive=document.getElementById('pd-drive').value.trim();

  let exames=[texto||'Exame solicitado'];
  if(jsonVal){
    try{
      const raw=jsonVal.replace(/```json|```/g,'').trim();
      const j=JSON.parse(raw);
      if(j.exames&&j.exames.length) exames=j.exames;
    }catch(e){}
  }

  const c=state.consultas.find(c=>c.id===consId);
  exames.forEach(nome=>{
    const id=uid();
    state.pedidosMedicos.push({id,consultaId:consId,nome:String(nome).trim(),status:'pendente',resultado:'',dataResultado:'',drive});
    if(c){ if(!c.pedidos) c.pedidos=[]; c.pedidos.push(id); }
  });
  saveState();
  document.querySelector('.overlay')?.remove();
  renderConsDetalhe(consId);
}

function showResultadoPedido(pedidoId){
  const p=state.pedidosMedicos.find(p=>p.id===pedidoId);
  if(!p) return;
  const sh=mkSheet(`Resultado: ${p.nome}`,`
    <div class="field"><label>Resultado *</label>
      <textarea id="res-resultado" placeholder="Descreva o resultado...">${esc(p.resultado||'')}</textarea></div>
    <div class="field"><label>Data do resultado</label>
      <input id="res-data" type="date" value="${p.dataResultado||today()}"></div>
    <div class="field"><label>Link Google Drive (opcional)</label>
      <input id="res-drive" type="url" value="${esc(p.drive||'')}"></div>
    <button class="btn btn-mae btn-full" onclick="salvarResultadoPedido('${esc(pedidoId)}')">✓ Salvar resultado</button>
  `);
  document.body.appendChild(sh);
}

function salvarResultadoPedido(pedidoId){
  const res=document.getElementById('res-resultado').value.trim();
  if(!res){ alert('Informe o resultado'); return; }
  const p=state.pedidosMedicos.find(p=>p.id===pedidoId);
  if(p){
    p.resultado=res; p.dataResultado=document.getElementById('res-data').value;
    p.drive=document.getElementById('res-drive').value; p.status='concluido';
    // Criar entrada em grupos
    state.grupos.push({
      id:uid(),p:1,nome:p.nome,data:p.dataResultado||today(),
      resultado:res,status:'ok',notas:`Resultado de pedido médico.`,drive:p.drive
    });
    saveState();
    document.querySelector('.overlay')?.remove();
    if(currentPage==='home') renderHome();
    else if(currentPage==='consultas') renderConsultas();
    else if(consDetalheId) renderConsDetalhe(consDetalheId);
  }
}

// FORM CONSULTA
function goConsForm(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-consform').classList.add('active');
  renderConsForm(id);
  window.scrollTo(0,0);
}

function renderConsForm(id){
  const c = id?state.consultas.find(c=>c.id===id):null;
  const perguntas = c?.perguntas||[];
  window._consFormId = id||null;
  window._consFormPerguntas = [...perguntas];
  let tipoHtml='';
  TIPOS_CONS.forEach(t=>{
    tipoHtml+=`<div class="chip ${c?.tipo===t?'active-mae':''}" onclick="setConsTipo('${esc(t)}',this)">${esc(t)}</div>`;
  });

  document.getElementById('pg-consform').innerHTML=`
  <button class="back-btn" onclick="${id?`goConsDetalhe('${esc(id)}')`:'goTo(\'consultas\')'}">← Voltar</button>
  <h2 style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;margin-bottom:16px">${id?'Editar Consulta':'Nova Consulta'}</h2>
  <div class="card">
    <div class="field"><label>Tipo</label>
      <div class="chips" id="chips-cons-tipo">${tipoHtml}</div></div>
    <div class="field"><label>Médico / Profissional *</label>
      <input id="cf-medico" type="text" value="${esc(c?.medico||'')}" placeholder="Ex: Dra. Ana Souza"></div>
    <div class="field"><label>Especialidade</label>
      <input id="cf-espec" type="text" value="${esc(c?.especialidade||'')}" placeholder="Ex: Obstetrícia"></div>
    <div class="field"><label>Clínica / Hospital</label>
      <input id="cf-clinica" type="text" value="${esc(c?.clinica||'')}" placeholder="Ex: Clínica Vida"></div>
    <div class="field"><label>Endereço</label>
      <input id="cf-end" type="text" value="${esc(c?.endereco||'')}" placeholder="Rua, número, bairro"></div>
    <div class="field"><label>Telefone</label>
      <input id="cf-tel" type="tel" value="${esc(c?.telefone||'')}" placeholder="(00) 0000-0000"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field"><label>Data *</label>
        <input id="cf-data" type="date" value="${c?.data||today()}"></div>
      <div class="field"><label>Hora *</label>
        <input id="cf-hora" type="time" value="${c?.hora||''}"></div>
    </div>
    <div class="field"><label>Perguntas para a consulta</label></div>
    <div id="cf-perguntas">${renderCfPerguntas()}</div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="cf-nova-p" type="text" placeholder="Adicionar pergunta..." style="flex:1;padding:8px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px" onkeydown="if(event.key==='Enter')addCfPergunta()">
      <button class="btn btn-ghost btn-sm" onclick="addCfPergunta()">+</button>
    </div>
    <button class="btn btn-mae btn-full" id="btn-salvar-cons" onclick="salvarConsulta()">✓ ${id?'Salvar alterações':'Agendar consulta'}</button>
  </div>`;
  window._consTipo = c?.tipo||'Pré-natal';
}

function renderCfPerguntas(){
  return (window._consFormPerguntas||[]).map((p,i)=>`
    <div class="duvida-item" style="margin-bottom:6px">
      <span class="duvida-txt">${esc(p)}</span>
      <button class="btn-x" onclick="delCfPergunta(${i})">✕</button>
    </div>`).join('');
}

function addCfPergunta(){
  const inp=document.getElementById('cf-nova-p');
  const t=inp.value.trim(); if(!t) return;
  window._consFormPerguntas.push(t); inp.value='';
  document.getElementById('cf-perguntas').innerHTML=renderCfPerguntas();
}

function delCfPergunta(i){
  window._consFormPerguntas.splice(i,1);
  document.getElementById('cf-perguntas').innerHTML=renderCfPerguntas();
}

function setConsTipo(t,el){
  window._consTipo=t;
  document.querySelectorAll('#chips-cons-tipo .chip').forEach(c=>c.className='chip');
  el.className='chip active-mae';
}

function salvarConsulta(){
  const medico=document.getElementById('cf-medico').value.trim();
  const data=document.getElementById('cf-data').value;
  const hora=document.getElementById('cf-hora').value;
  if(!medico||!data||!hora){ alert('Preencha médico, data e hora'); return; }
  const id=window._consFormId;
  const dados={
    tipo:window._consTipo||'Pré-natal',medico,
    especialidade:document.getElementById('cf-espec').value,
    clinica:document.getElementById('cf-clinica').value,
    endereco:document.getElementById('cf-end').value,
    telefone:document.getElementById('cf-tel').value,
    data,hora,perguntas:[...(window._consFormPerguntas||[])],
  };
  if(id){
    const c=state.consultas.find(c=>c.id===id);
    if(c) Object.assign(c,dados);
    saveState(); goConsDetalhe(id);
  } else {
    const nc={id:uid(),...dados,realizada:false,anotacoes:'',pedidos:[],examesVinculados:[]};
    state.consultas.push(nc);
    saveState(); goTo('consultas');
  }
}

// HISTÓRICO
function renderConsHist(){
  const realizadas=[...state.consultas.filter(c=>c.realizada)].sort((a,b)=>b.data.localeCompare(a.data));
  document.getElementById('pg-conshist').innerHTML=`
  <button class="back-btn" onclick="goTo('consultas')">← Voltar</button>
  <h2 style="font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;margin-bottom:16px">📄 Histórico de Consultas</h2>
  ${realizadas.map(c=>`
    <div class="exame-item card-clickable" onclick="goConsDetalhe('${esc(c.id)}')">
      <span style="font-size:24px">✅</span>
      <div class="exame-info">
        <div class="exame-nome">${esc(c.medico)} <span class="pill pill-realizada">✓</span></div>
        <div class="exame-data">${fmtDate(c.data)} · ${esc(c.hora)}</div>
        <div class="exame-resumo">${esc(c.clinica)}</div>
      </div>
      <span style="color:var(--inkSoft)">›</span>
    </div>`).join('')}
  ${!realizadas.length?'<div class="card" style="text-align:center;color:var(--inkSoft);padding:20px">Nenhuma consulta realizada ainda</div>':''}`;
}

// ============================
// UTILITÁRIOS MODAL
// ============================
function mkSheet(titulo, conteudo){
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
  ov.innerHTML=`
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">${esc(titulo)}</div>
    ${conteudo}
  </div>`;
  return ov;
}

// ============================
// OVERRIDE GOTO COM HIST
// ============================
const _origGoTo = goTo;
window.goTo = function(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  currentPage=page;
  if(page==='conshist') renderConsHist();
  else renderPage(page);
  window.scrollTo(0,0);
};

// ============================
// INIT
// ============================
document.addEventListener('DOMContentLoaded',()=>{
  loadState();
  renderHome();
});
</script>
</body>
</html>
